spring.application.name=backend

# ──────────────────────────────────────────────────────────────────
# Database Configuration
# Set these as environment variables — NEVER hardcode credentials!
# Local:   export DB_URL=jdbc:mysql://localhost:3306/ems_db
# Render:  Set in the service's Environment Variables panel
# ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ems_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ──────────────────────────────────────────────────────────────────
# JWT Configuration
# Set JWT_SECRET as an environment variable in production
# ──────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
jwt.expiration=86400000

# Server Port
server.port=${PORT:8080}
